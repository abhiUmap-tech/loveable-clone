spring:
  application:
    name: loveable-clone

  datasource:
    url: jdbc:postgresql://localhost:9010/pgvector-test
    username: user
    password: password

  jpa:
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update   # dev only
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379

  # OPEN-AI Configurations
  ai:
    openai:
      api-key: ${OPEN_ROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: nvidia/nemotron-3-super-120b-a12b:free
          temperature: 0.0


